# Render Blueprint for GullyScore
# Docs: https://render.com/docs/blueprint-spec
#
# This file provisions two services:
#   1. gullyscore-backend  - Node/Express web service
#   2. gullyscore-frontend - React static site
#
# MongoDB is NOT provisioned here - Render no longer hosts MongoDB.
# Use MongoDB Atlas (free tier is fine) and paste the connection string
# into the MONGO_URI env var in the Render dashboard.

services:
  # ---------- Backend API ----------
  - type: web
    name: gullyscore-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false          # set via Render dashboard (Atlas SRV URI)
      - key: CORS_ORIGIN
        sync: false          # e.g. https://gullyscore-frontend.onrender.com

  # ---------- Frontend (React static site) ----------
  - type: web
    name: gullyscore-frontend
    runtime: static
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    autoDeploy: true
    envVars:
      - key: REACT_APP_API_URL
        sync: false          # e.g. https://gullyscore-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
