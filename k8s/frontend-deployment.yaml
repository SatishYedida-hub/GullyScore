apiVersion: apps/v1
kind: Deployment
metadata:
  name: gullyscore-frontend
  namespace: gullyscore
  labels:
    app.kubernetes.io/name: gullyscore-frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: gullyscore-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gullyscore-frontend
    spec:
      terminationGracePeriodSeconds: 15
      containers:
        - name: frontend
          # Replaced by Jenkins at deploy time. Format:
          #   <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/gullyscore-frontend:<IMAGE_TAG>
          image: <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/gullyscore-frontend:<IMAGE_TAG>
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "192Mi"
          # nginx needs to write /var/cache/nginx and /var/run at runtime,
          # so readOnlyRootFilesystem isn't practical without extra volumes.
          # We still drop privileges.
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "SETUID", "SETGID", "NET_BIND_SERVICE"]
