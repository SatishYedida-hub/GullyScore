apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gullyscore-backend
  namespace: gullyscore
  labels:
    app.kubernetes.io/name: gullyscore-backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gullyscore-backend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 0
