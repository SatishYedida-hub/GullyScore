apiVersion: apps/v1
kind: Deployment
metadata:
  name: gullyscore-backend
  namespace: gullyscore
  labels:
    app.kubernetes.io/name: gullyscore-backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: gullyscore-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gullyscore-backend
    spec:
      # Let in-flight requests finish on rollout / scale-in.
      terminationGracePeriodSeconds: 30
      containers:
        - name: backend
          # Replaced by Jenkins at deploy time. Format:
          #   <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/gullyscore-backend:<IMAGE_TAG>
          image: <ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/gullyscore-backend:<IMAGE_TAG>
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
          envFrom:
            - configMapRef:
                name: gullyscore-backend-config
            - secretRef:
                name: gullyscore-backend
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]
