apiVersion: v1
kind: ConfigMap
metadata:
  name: gullyscore-backend-config
  namespace: gullyscore
  labels:
    app.kubernetes.io/name: gullyscore-backend
data:
  NODE_ENV: "production"
  PORT: "5000"
  # Comma-separated list of allowed origins, or "*" for everyone.
  # In production, set this to your public frontend URL.
  CORS_ORIGIN: "*"
