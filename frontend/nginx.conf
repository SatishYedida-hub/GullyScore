# GullyScore frontend – nginx config for the built CRA bundle.
#
# - Serves /usr/share/nginx/html statically.
# - Falls back to index.html for any unknown path so React Router owns
#   client-side routing (no more 404s on deep-link refresh).
# - Reverse-proxies /api/* to the backend Kubernetes Service when the
#   BACKEND_URL env var is set at container start. If your frontend is
#   built with REACT_APP_API_URL pointing to an absolute backend URL
#   (e.g. https://api.example.com/api), you can ignore the proxy block
#   entirely.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip text responses for a noticeable size win on CRA bundles.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 1024;

    # Long-cache the hashed static assets CRA emits under /static/.
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy API calls to the backend service. In Kubernetes this resolves
    # via the cluster DNS (e.g. http://gullyscore-backend.gullyscore.svc.cluster.local:5000).
    # Set the BACKEND_URL env var in the Deployment to enable it.
    location /api/ {
        # Default to the K8s in-cluster DNS name; override with
        # BACKEND_URL at deploy time for other environments.
        set $backend_url "http://gullyscore-backend:5000";
        proxy_pass $backend_url;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback — anything that isn't a file/dir routes to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Basic hardening
    server_tokens off;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
